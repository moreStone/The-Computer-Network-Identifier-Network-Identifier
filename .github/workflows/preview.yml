name: Preview Upload

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize]

jobs:
  preview:
    name: Upload Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Upload preview to WeChat
        id: preview
        run: node scripts/upload-preview.js
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
